<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElevateMe · Page Not Found</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Nunito Sans',sans-serif; }
        body { min-height:100vh; background:#c8ecd4; display:flex; align-items:center; justify-content:center; }
        .card { background:white; border-radius:20px; padding:3rem; text-align:center; max-width:420px; width:100%; box-shadow:0 8px 40px rgba(45,74,53,0.12); }
        h1 { font-size:4rem; font-weight:900; color:#488a6d; }
        h2 { font-size:1.3rem; font-weight:800; color:#1a1a1a; margin:0.5rem 0; }
        p { color:#4a6b55; font-size:0.9rem; margin-bottom:2rem; }
        a { background:#488a6d; color:white; text-decoration:none; padding:0.8rem 2rem; border-radius:10px; font-weight:700; font-size:0.9rem; }
        a:hover { background:#c7493a; }
    </style>
</head>
<body>
    <div class="card">
        <h1>404</h1>
        <h2>Page not found</h2>
        <p>This page doesn't exist or you may not have access.</p>
        <a href="/">Back to Dashboard</a>
    </div>
</body>
</html>
